{% extends "base.html" %}
{% block content %}
<h3 class="fw-bolder mb-4 text-dark" style="letter-spacing: -0.5px;">New Housing Loan Application</h3>
<div class="row">
    <div class="col-lg-8">
        <form id="loanForm" method="POST" action="">
            <!-- Financial Information Card -->
            <div class="card shadow-sm border-0 rounded-4 mb-4">
                <div class="card-body p-4 p-md-5">
                    <h5 class="text-primary fw-bold mb-4 d-flex align-items-center">
                        <span class="bg-primary bg-opacity-10 p-2 rounded-3 me-3 text-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-cash-stack" viewBox="0 0 16 16">
                                <path d="M1 3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1H1zm7 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
                                <path d="M0 5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V5zm3 0a2 2 0 0 1-2 2v4a2 2 0 0 1 2 2h10a2 2 0 0 1 2-2V7a2 2 0 0 1-2-2H3z"/>
                            </svg>
                        </span>
                        Financial Information
                    </h5>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Applicant Income ($)</label>
                            <input type="number" step="0.01" name="income" class="form-control form-control-lg bg-light" required placeholder="e.g. 5000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Coapplicant Income ($)</label>
                            <input type="number" step="0.01" name="coapplicant_income" class="form-control form-control-lg bg-light" required value="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Loan Amount ($)</label>
                            <input type="number" step="0.01" name="loan_amount" class="form-control form-control-lg bg-light" required placeholder="e.g. 150000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Loan Term (Months)</label>
                            <input type="number" step="1" name="loan_term" class="form-control form-control-lg bg-light" required value="360">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Personal Information Card -->
            <div class="card shadow-sm border-0 rounded-4 mb-4">
                <div class="card-body p-4 p-md-5">
                    <h5 class="text-primary fw-bold mb-4 d-flex align-items-center">
                        <span class="bg-primary bg-opacity-10 p-2 rounded-3 me-3 text-primary">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-person-badge" viewBox="0 0 16 16">
                                <path d="M6.5 2a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1h-3zM11 8a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                                <path d="M4.5 0A2.5 2.5 0 0 0 2 2.5V14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2.5A2.5 2.5 0 0 0 11.5 0h-7zM3 2.5A1.5 1.5 0 0 1 4.5 1h7A1.5 1.5 0 0 1 13 2.5v10.795a4.2 4.2 0 0 0-.776-.492C11.392 12.387 10.063 12 8 12s-3.392.387-4.224.803a4.2 4.2 0 0 0-.776.492V2.5z"/>
                            </svg>
                        </span>
                        Personal Information
                    </h5>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Education</label>
                            <select name="education" class="form-select form-control-lg bg-light" required>
                                <option value="Graduate">Graduate</option>
                                <option value="Not Graduate">Not Graduate</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Married</label>
                            <select name="married" class="form-select form-control-lg bg-light" required>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Dependents</label>
                            <select name="dependents" class="form-select form-control-lg bg-light" required>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3+">3+</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted fw-semibold">Property Area</label>
                            <select name="property_area" class="form-select form-control-lg bg-light" required>
                                <option value="Urban">Urban</option>
                                <option value="Semiurban">Semiurban</option>
                                <option value="Rural">Rural</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="d-flex justify-content-end mb-5">
                <a href="{{ url_for('main.dashboard') }}" class="btn btn-light btn-lg text-muted fw-bold me-3 px-4">Cancel</a>
                <button type="submit" class="btn btn-primary btn-lg fw-bold px-5 shadow">Get Prediction Analysis</button>
            </div>
        </form>
    </div>

    <!-- Right Sidebar - Credit Score Widget -->
    <div class="col-lg-4 mb-4">
        <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 2rem;">
            <div class="card-body p-4 text-center">
                <h6 class="text-uppercase fw-bold text-muted mb-4 pb-2 border-bottom">Credit Score Assessment</h6>
                
                <div class="d-flex justify-content-center position-relative my-4">
                    <!-- SVG Half Circle Gauge -->
                    <svg viewBox="0 0 200 110" style="width: 100%; max-width: 250px; overflow: visible;">
                        <!-- Background Track -->
                        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#e2e8f0" stroke-width="25" stroke-linecap="round" />
                        
                        <!-- Segments -->
                        <!-- Poor (300-580) -->
                        <path d="M 20 100 A 80 80 0 0 1 50.6 35.8" fill="none" stroke="#ef4444" stroke-width="25" stroke-linecap="round" />
                        <!-- Fair (581-649) -->
                        <path d="M 50.6 35.8 A 80 80 0 0 1 100 20" fill="none" stroke="#f59e0b" stroke-width="25" stroke-linecap="butt" />
                        <!-- Good (650-699) -->
                        <path d="M 100 20 A 80 80 0 0 1 149.4 35.8" fill="none" stroke="#3b82f6" stroke-width="25" stroke-linecap="butt" />
                        <!-- Excellent (700-850) -->
                        <path d="M 149.4 35.8 A 80 80 0 0 1 180 100" fill="none" stroke="#22c55e" stroke-width="25" stroke-linecap="round" />

                        <!-- Gauge Needle -->
                        <g id="needleGroup" style="transform-origin: 100px 100px; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);">
                            <circle cx="100" cy="100" r="10" fill="#1e293b" />
                            <circle cx="100" cy="100" r="4" fill="#ffffff" />
                            <polygon points="97,100 103,100 100,25" fill="#1e293b" />
                        </g>
                        
                    </svg>
                </div>

                <div class="mb-2">
                    <span id="scoreValue" class="display-5 fw-bolder text-dark">750</span>
                    <div id="scoreBadge" class="badge bg-success bg-opacity-10 text-success fs-6 px-3 py-2 rounded-pill mt-2 border border-success border-opacity-25">Excellent</div>
                </div>
                
                <p class="text-muted small mt-3 px-2">Adjust your estimated Credit Score using the slider below. Higher scores improve loan approval odds.</p>

                <div class="mt-4 px-3">
                    <input type="range" class="form-range" id="creditScoreSlider" min="300" max="850" value="750">
                    <input type="hidden" form="loanForm" name="credit_history" id="creditHistoryInput" value="1.0">
                </div>
                
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
                        const slider = document.getElementById('creditScoreSlider');
                        const needle = document.getElementById('needleGroup');
                        const scoreText = document.getElementById('scoreValue');
                        const scoreBadge = document.getElementById('scoreBadge');
                        const hiddenInput = document.getElementById('creditHistoryInput');
                        const form = document.querySelector('form');
                        
                        // Attach the hidden input to the form directly via JS fallback just in case
                        form.appendChild(hiddenInput);

                        function updateGauge(score) {
                            let percentage = (score - 300) / 550;
                            let degrees = (percentage * 180) - 90;
                            
                            needle.style.transform = `rotate(${degrees}deg)`;
                            scoreText.innerText = score;

                            if (score < 581) {
                                scoreBadge.className = 'badge bg-danger bg-opacity-10 text-danger fs-6 px-3 py-2 rounded-pill mt-2 border border-danger border-opacity-25';
                                scoreBadge.innerText = 'Poor';
                                scoreText.style.color = '#ef4444';
                            } else if (score < 650) {
                                scoreBadge.className = 'badge bg-warning bg-opacity-10 text-warning fs-6 px-3 py-2 rounded-pill mt-2 border border-warning border-opacity-50';
                                scoreBadge.innerText = 'Fair';
                                scoreText.style.color = '#f59e0b';
                            } else if (score < 700) {
                                scoreBadge.className = 'badge bg-primary bg-opacity-10 text-primary fs-6 px-3 py-2 rounded-pill mt-2 border border-primary border-opacity-25';
                                scoreBadge.innerText = 'Good';
                                scoreText.style.color = '#3b82f6';
                            } else {
                                scoreBadge.className = 'badge bg-success bg-opacity-10 text-success fs-6 px-3 py-2 rounded-pill mt-2 border border-success border-opacity-25';
                                scoreBadge.innerText = 'Excellent';
                                scoreText.style.color = '#22c55e';
                            }
                            
                            // Send the actual raw score
                            hiddenInput.value = score;
                        }

                        slider.addEventListener('input', function() {
                            updateGauge(this.value);
                        });

                        updateGauge(slider.value);
                    });
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
